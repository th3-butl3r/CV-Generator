services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=DOCKER
    volumes:
      - ./src/config/.env:/app/src/config/.env:ro
    depends_on:
      ollama-init:
        condition: service_completed_successfully

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  # Descarga el modelo una vez; en arranques posteriores detecta que ya existe y termina rápido
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: ["pull", "qwen2.5:0.5b"]
    restart: "no"

volumes:
  ollama_data:
